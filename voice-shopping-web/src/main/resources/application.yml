server:
  port: 8080

spring:
  application:
    name: voice-shopping
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeVideoAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/voice_shopping}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "0"
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    jpa:
      repositories:
        bootstrap-mode: default
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Sa-Token
sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid

# DashScope
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  model:
    main: qwen-max
    light: qwen-turbo

# Embedding configuration
voice-shopping:
  embedding:
    model: ${EMBEDDING_MODEL:text-embedding-v3}
    concurrency: ${EMBEDDING_CONCURRENCY:5}
  voice:
    asr:
      model: ${VOICE_ASR_MODEL:paraformer-realtime-v2}
    tts:
      model: ${VOICE_TTS_MODEL:cosyvoice-v1}
      voice: ${VOICE_TTS_VOICE:longwan}
  perspective:
    enabled: true
  compliance:
    # 绝对化用词替换。key=违规词，value=合规替代。
    # 顺序重要：长串放前面（"最便宜" 必须先于 "便宜" 命中），LinkedHashMap 保留顺序。
    absolute-claim-patterns:
      最便宜: 性价比高
      最划算: 比较划算
      最好: 比较好
      第一: 表现突出
      唯一: 少有
      百分百: 较高比例
      100%: 较高比例
      包治百病: 适合多数情况
      绝对: 通常
      永远: 长期

logging:
  level:
    com.voiceshopping: DEBUG

# Spring AI Alibaba
spring-ai:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    chat:
      options:
        model: qwen-max

# Actuator — expose Prometheus scrape endpoint and basic health
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
